<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hummus', sans-serif; background-color: #0c0c0c; color: #ffdddd; min-height: 100vh; padding: 40px 20px; }
.navbar { background-color: #1f0000; border: 3px solid #8b0000; padding: 12px 20px; border-radius: 12px; margin-bottom: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(139,0,0,0.6); }
.navbar a.brand { color: #ffaaaa; text-decoration: none; font-size: 1.3rem; margin-right: 16px; }
.navbar a.brand:hover { color: #ff4d4d; }
.nav-items { display: flex; gap: 4px; }
.dropdown { position: relative; }
.dropdown > a { color: #ffaaaa; text-decoration: none; font-size: 1.1rem; padding: 8px 14px; border-radius: 8px; display: flex; align-items: center; gap: 6px; transition: color .2s, background .2s; }
.dropdown > a:hover { color: #ff4d4d; background: rgba(139,0,0,0.3); }
.caret { font-size: .65em; display: inline-block; transition: transform .25s ease; }
.dropdown:hover .caret { transform: rotate(180deg); }
.dropdown-menu { position: absolute; top: calc(100% + 8px); left: 0; background: #1a0000; border: 2px solid #8b0000; border-radius: 10px; min-width: 170px; overflow: hidden; z-index: 100; opacity: 0; transform: translateY(-10px) scaleY(0.9); transform-origin: top center; pointer-events: none; transition: opacity .22s ease, transform .22s ease; box-shadow: 0 8px 24px rgba(139,0,0,0.5); }
.dropdown:hover .dropdown-menu, .dropdown:focus-within .dropdown-menu { opacity: 1; transform: translateY(0) scaleY(1); pointer-events: all; }
.dropdown-menu a { display: block; padding: 10px 18px; color: #ffbbbb; text-decoration: none; font-size: 1rem; border-bottom: 1px solid rgba(139,0,0,0.3); transition: background .18s, color .18s, padding-left .2s; }
.dropdown-menu a:last-child { border-bottom: none; }
.dropdown-menu a:hover { background: rgba(139,0,0,0.4); color: #ff4d4d; padding-left: 26px; }
.volver { display: inline-block; margin-bottom: 24px; color: #ff9999; text-decoration: none; font-size: 1rem; transition: color .2s; }
.volver:hover { color: #ff4d4d; }
.container { width: 50%; margin: 0 auto; padding: 35px; background: rgba(15,0,0,0.92); border-radius: 12px; border: 3px solid #8b0000; box-shadow: 0 0 30px rgba(139,0,0,0.6); }
.container::before { content: ""; display: block; height: 2px; width: 100%; background: #ff3333; margin-bottom: 24px; box-shadow: 0 0 10px #ff3333; }
h2 { text-align: center; color: #ff3333; font-size: 2rem; letter-spacing: 4px; text-shadow: 3px 3px 0 #000; margin-bottom: 28px; }
label { display: block; margin-bottom: 6px; font-size: 1rem; color: #ffaaaa; }
input, textarea, select { width: 100%; padding: 12px 14px; margin-bottom: 18px; border: 2px solid #8b0000; border-radius: 8px; background: #0c0c0c; color: #ffdddd; font-family: 'Hummus', sans-serif; font-size: 1rem; outline: none; transition: border-color .3s, box-shadow .3s; }
input:focus, textarea:focus, select:focus { border-color: #ff3333; box-shadow: 0 0 12px rgba(255,51,51,0.5); }
select option { background: #1a0000; }
button[type="submit"] { width: 100%; padding: 14px; background: #8b0000; color: #ffdddd; border: 2px solid #8b0000; border-radius: 8px; font-family: 'Hummus', sans-serif; font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: background .2s, box-shadow .2s, transform .15s; }
button[type="submit"]:hover { background: #ff3333; border-color: #ff3333; box-shadow: 0 0 16px rgba(255,51,51,0.7); transform: scale(1.02); }
#mensaje { text-align: center; margin-top: 16px; font-size: 1.1rem; }
@media(max-width: 768px) { .container { width: 95%; } }
</style>

<div class="container">
    <a class="volver" href="ListaCasos.html">⬅ Volver a Casos</a>
    <h2>➕ NUEVO CASO</h2>

    <form id="formCaso" onsubmit="guardar(event)">
        <label>Título del caso:</label>
        <input type="text" name="titulo" placeholder="Título del caso" required>

        <label>Descripción:</label>
        <textarea name="descripcion" rows="4" placeholder="Descripción del caso" required></textarea>

        <label>Estado:</label>
        <select name="estado">
            <option value="abierto">Abierto</option>
            <option value="pendiente">Pendiente</option>
            <option value="cerrado">Cerrado</option>
        </select>

        <label>Fecha:</label>
        <input type="date" name="fecha" required style="color-scheme: dark;">

        <button type="submit">Guardar Caso</button>
    </form>
    <p id="mensaje"></p>
</div>

<script>
function guardar(e) {
    e.preventDefault();
    const p = document.getElementById('mensaje');
    p.style.color = '#00ff88';
    p.textContent = '✅ Caso guardado (maqueta)';
    setTimeout(() => { p.textContent = ''; e.target.reset(); }, 2500);
}
</script>
