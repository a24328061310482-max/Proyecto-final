    <h1>MAESTRO POKÉMON: DULCE MARGARITA GUERRERO YADO</h1>
    
    <img src="./Sylveon.gif" width="400px" style="display:block; margin:0 auto 20px;">

    <div class="search-container" style="text-align:center; margin:20px 0;">
        <input type="text" id="pokename" placeholder="Escribe el nombre del Pokémon" class="placeholder">
        <br><br>
        <button onclick="fetchPokemon()" class="button">Buscar Pokémon</button>
    </div>

    <img src="./Yado.jpg" alt="PokeMaster" id="pokeImg" width="250px" class="pokeImg" style="display:block; margin:20px auto;">

    <div id="pokemonInfo" style="text-align:center; margin:20px 0; font-size:1.2em;"></div>

    <div class="grafica" style="max-width:700px; margin:30px auto;">
        <canvas id="miCanvas"></canvas>
    </div>

    <script src="Chart.js"></script>
    <script>
        let myChart = null;

        async function fetchPokemon() {
            const input = document.getElementById('pokename').value.trim().toLowerCase();
            const infoDiv = document.getElementById('pokemonInfo');
            const img = document.getElementById('pokeImg');

            if (!input) {
                infoDiv.innerHTML = "<p style='color:red;'>Por favor escribe un nombre de Pokémon</p>";
                return;
            }

            infoDiv.innerHTML = "<p>Cargando...</p>";

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${input}`);
                
                if (!response.ok) throw new Error();

                const data = await response.json();

                // Actualizar imagen (oficial)
                img.src = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;

                // Mostrar nombre y tipos
                const types = data.types.map(t => t.type.name.toUpperCase()).join(" / ");
                infoDiv.innerHTML = `
                    <h2>${data.name.toUpperCase()} #${data.id}</h2>
                    <p><strong>Tipos:</strong> ${types}</p>
                `;

                // Preparar datos para la gráfica
                const stats = data.stats;
                const labels = stats.map(stat => stat.stat.name.toUpperCase());
                const values = stats.map(stat => stat.base_stat);

                // Destruir gráfica anterior si existe
                if (myChart) myChart.destroy();

                // Crear nueva gráfica
                const ctx = document.getElementById('miCanvas').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Estadísticas Base',
                            data: values,
                            backgroundColor: '#ff3333',
                            borderColor: '#fff',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, max: 150 }
                        }
                    }
                });

            } catch (error) {
                infoDiv.innerHTML = `<p style="color:red;">Pokémon no encontrado 😢</p>`;
                img.src = "./Yado.jpg"; // vuelve a la imagen original
            }
        }
    </script>
</body>
