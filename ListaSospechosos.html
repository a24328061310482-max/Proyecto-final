<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Hummus', sans-serif;
    background-color: #0c0c0c;
    color: #ffdddd;
    min-height: 100vh;
    padding: 40px 20px;
}

h2 {
    text-align: center;
    font-size: 2.5rem;
    color: #ff3333;
    letter-spacing: 5px;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #000;
    margin-bottom: 10px;
}

/* ── NAVBAR ── */
.navbar { background-color: #1f0000; border: 3px solid #8b0000; padding: 12px 20px; border-radius: 12px; margin-bottom: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(139,0,0,0.6); }
.navbar a.brand { color: #ffaaaa; text-decoration: none; font-size: 1.3rem; margin-right: 16px; }
.navbar a.brand:hover { color: #ff4d4d; }
.nav-items { display: flex; gap: 4px; }
.dropdown { position: relative; }
.dropdown > a { color: #ffaaaa; text-decoration: none; font-size: 1.1rem; padding: 8px 14px; border-radius: 8px; display: flex; align-items: center; gap: 6px; transition: color .2s, background .2s; }
.dropdown > a:hover { color: #ff4d4d; background: rgba(139,0,0,0.3); }
.caret { font-size: .65em; display: inline-block; transition: transform .25s ease; }
.dropdown:hover .caret { transform: rotate(180deg); }
.dropdown-menu { position: absolute; top: calc(100% + 8px); left: 0; background: #1a0000; border: 2px solid #8b0000; border-radius: 10px; min-width: 170px; overflow: hidden; z-index: 100; opacity: 0; transform: translateY(-10px) scaleY(0.9); transform-origin: top center; pointer-events: none; transition: opacity .22s ease, transform .22s ease; box-shadow: 0 8px 24px rgba(139,0,0,0.5); }
.dropdown:hover .dropdown-menu, .dropdown:focus-within .dropdown-menu { opacity: 1; transform: translateY(0) scaleY(1); pointer-events: all; }
.dropdown-menu a { display: block; padding: 10px 18px; color: #ffbbbb; text-decoration: none; font-size: 1rem; border-bottom: 1px solid rgba(139,0,0,0.3); transition: background .18s, color .18s, padding-left .2s; }
.dropdown-menu a:last-child { border-bottom: none; }
.dropdown-menu a:hover { background: rgba(139,0,0,0.4); color: #ff4d4d; padding-left: 26px; }

/* ── VOLVER ── */
.volver {
    display: inline-block;
    margin-bottom: 24px;
    color: #ff9999;
    text-decoration: none;
    font-size: 1rem;
    transition: color .2s;
}
.volver:hover { color: #ff4d4d; }

/* ── TABLA ── */
.table-container {
    background: #1a0000;
    border: 3px solid #8b0000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 24px rgba(139,0,0,0.5);
    overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; }

th {
    background-color: #8b0000;
    color: #ffdddd;
    padding: 14px 16px;
    text-transform: uppercase;
    text-align: left;
    letter-spacing: 2px;
    font-size: .9rem;
    border-bottom: 2px solid #ff3333;
}

td {
    padding: 12px 16px;
    border-bottom: 1px solid #330000;
    color: #ffbbbb;
    font-size: .95rem;
}

tbody tr:last-child td { border-bottom: none; }
tr:hover td { background-color: #260000; color: #ffdddd; transition: background .2s, color .2s; }
</style>

<h2>👤 SOSPECHOSOS</h2>

                <th>Edad</th>

            </tr>
        </thead>
        <tbody id="cuerpo"></tbody>

<script>
// Datos de maqueta — reemplazar con fetch al servidor cuando haya BD
const sospechosos = [
    { id: 1, nombre: "Carlos Mendoza",   edad: 34, direccion: "Calle Oscura 12" },
    { id: 2, nombre: "Ana Ruiz",         edad: 27, direccion: "Av. Las Sombras 88" },
    { id: 3, nombre: "Roberto Vega",     edad: 45, direccion: "Callejón Sin Nombre 3" },
    { id: 4, nombre: "Silvia Torres",    edad: 31, direccion: "Col. El Páramo 57" },
    { id: 5, nombre: "Desconocido #5",   edad: 22, direccion: "Sin dirección registrada" },
];

const tbody = document.getElementById('cuerpo');
sospechosos.forEach(s => {
    tbody.innerHTML += `
    <tr>
        <td>${s.id}</td>
        <td>${s.nombre}</td>
        <td>${s.edad}</td>
        <td>${s.direccion}</td>
    </tr>`;
});
