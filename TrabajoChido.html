<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/hummus" rel="stylesheet">
    <title>The Legend Of-Zelda - Dulce Margarita Guerrero Yado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0a0a; color: #ffdddd; font-family: 'Hummus', sans-serif; min-height: 100vh; }

        .navbar { background-color: #1a0000; border-bottom: 4px solid #8b0000; padding: 15px 0; text-align: center; }
        .navbar ul { list-style:none; display:flex; justify-content:center; gap:40px; flex-wrap:wrap; }
        .navbar a { color:#ffaaaa; text-decoration:none; font-size:1.3rem; padding:10px 20px; }
        .navbar a:hover { color:#ff5555; }

        .title { text-align:center; font-size:4.5rem; color:#ff3333; margin:40px 0 10px 0; text-shadow:0 0 15px #ff0000; }
        .subtitle { text-align:center; font-size:1.8rem; color:#ff9999; margin-bottom:30px; }

        .search-container { text-align:center; margin-bottom:20px; }
        .search-container input { padding:12px 18px; width:400px; max-width:75%; background:#1f0a0a; border:2px solid #8b0000; color:white; font-size:1.1rem; border-radius:8px; font-family:'Hummus',sans-serif; }
        .search-container input::placeholder { color:#aa6666; }
        .search-container button { padding:12px 28px; background:#8b0000; color:white; border:none; font-size:1.1rem; border-radius:8px; cursor:pointer; margin-left:10px; font-family:'Hummus',sans-serif; transition:background .2s; }
        .search-container button:hover { background:#ff3333; }

        .categorias { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:30px; padding:0 20px; }
        .cat-btn { padding:8px 20px; border:2px solid #8b0000; border-radius:20px; background:transparent; color:#ffaaaa; font-size:1rem; cursor:pointer; font-family:'Hummus',sans-serif; transition:all .2s; }
        .cat-btn:hover { background:#8b0000; color:#fff; }
        .cat-btn.active { background:#ff3333; border-color:#ff3333; color:#fff; }

        /* ── GRID ── */
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:0 30px; max-width:1400px; margin:0 auto; }

        /* ── CARD estilo película ── */
        .card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 2/3;
            background: #1a0000;
            border: 2px solid #8b0000;
            transition: transform .3s, box-shadow .3s;
        }
        .card:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(180,0,0,0.5); }

        /* imagen ocupa todo */
        .card img, .card .sin-imagen {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card .sin-imagen {
            background: linear-gradient(135deg,#1a0000,#2a0808,#1a0000);
            display: flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
        }
        .card .sin-imagen .escudo { font-size:3.5rem; opacity:0.35; }
        .card .sin-imagen .nombre-ph { color:#aa4444; font-size:1rem; text-align:center; padding:0 14px; opacity:0.8; }

        /* degradado inferior */
        .card .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 12px 14px;
            background: linear-gradient(transparent, rgba(0,0,0,0.92));
        }
        .card .overlay .nombre {
            color: #ffdddd;
            font-size: 1rem;
            font-family: 'Hummus', sans-serif;
            margin-bottom: 8px;
            text-shadow: 0 1px 4px #000;
        }
        .card .overlay .acciones {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card .overlay .badge {
            background: #8b0000;
            color: #fff;
            font-size: .7rem;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .card .overlay .btn-resumen {
            background: transparent;
            border: none;
            color: #ff9999;
            font-family: 'Hummus', sans-serif;
            font-size: .85rem;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }
        .card .overlay .btn-resumen:hover { color: #ff3333; }

        /* ── MODAL resumen ── */
        .modal-bg {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-bg.open { display: flex; }
        .modal {
            background: #1a0000;
            border: 3px solid #8b0000;
            border-radius: 14px;
            max-width: 480px;
            width: 90%;
            padding: 28px;
            position: relative;
            text-align: center;
        }
        .modal img { width:100%; max-height:260px; object-fit:cover; border-radius:8px; margin-bottom:16px; }
        .modal h2 { color:#ff3333; font-size:1.5rem; margin-bottom:10px; }
        .modal p { color:#ffbbbb; font-size:.95rem; line-height:1.6; }
        .modal .cerrar {
            position: absolute; top:12px; right:14px;
            background: none; border: none;
            color: #ff9999; font-size:1.5rem; cursor: pointer;
        }
        .modal .cerrar:hover { color:#ff3333; }

        .msg { text-align:center; grid-column:1/-1; color:#ff9999; font-size:1.4rem; padding:50px 0; }

        .paginacion { display:flex; justify-content:center; align-items:center; gap:12px; margin:30px 0 50px; flex-wrap:wrap; }
        .paginacion button { padding:10px 22px; background:#8b0000; color:white; border:none; border-radius:8px; font-size:1rem; cursor:pointer; font-family:'Hummus',sans-serif; transition:background .2s; }
        .paginacion button:hover { background:#ff3333; }
        .paginacion button:disabled { background:#3a0000; color:#aa5555; cursor:not-allowed; }
        .paginacion span { color:#ff9999; font-size:.95rem; }
    </style>
</head>

<h1 class="title">THE LEGEND OF ZELDA</h1>
<p class="subtitle">DULCE MARGARITA GUERRERO YADO</p>

<div class="search-container">
    <input type="text" id="busqueda" placeholder="Busca un nombre..."
           onkeydown="if(event.key==='Enter') buscar()">
    <button onclick="buscar()">Buscar</button>
</div>

<div class="categorias" id="categorias"></div>
<div id="resultado" class="card-grid"></div>

<!-- Modal resumen -->
<div class="modal-bg" id="modalBg" onclick="cerrarModal(event)">
    <div class="modal" id="modal">

function obtenerImagen(nombre) {
    if (!nombre) return null;
    const clave = nombre.toLowerCase();
    if (IMAGENES[clave]) return IMAGENES[clave];
    for (const [key, url] of Object.entries(IMAGENES)) {
        if (clave.includes(key) || key.includes(clave)) return url;
    }
    return null;
}

function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
        dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
}

const BASE_URL = 'https://zelda.fanapis.com/api';
const CATEGORIAS = [
    { key: 'characters', label: 'Personajes' },
    { key: 'monsters',   label: 'Monstruos'   },
    { key: 'bosses',     label: 'Jefes'        },
    { key: 'items',      label: 'Objetos'      },
    { key: 'places',     label: 'Lugares'      },
];

let categoriaActual = 'characters';
let todosLosItems   = [];
let paginaActual    = 1;
let queryActual     = '';
const POR_PAGINA    = 20;

// Botones categoría
const contenedorCats = document.getElementById('categorias');
CATEGORIAS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className   = 'cat-btn' + (cat.key === categoriaActual ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => {
        categoriaActual = cat.key; paginaActual = 1; queryActual = ''; todosLosItems = [];
        document.getElementById('busqueda').value = '';
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        cargar();
    };
    contenedorCats.appendChild(btn);
});

async function traerTodos() {
    let pagina = 1, todos = [];
    while (true) {
        const resp  = await fetch(`${BASE_URL}/${categoriaActual}?limit=100&page=${pagina}`);
        if (!resp.ok) break;
        const data  = await resp.json();
        const items = data.data || [];
        todos = todos.concat(items);
        if (items.length < 100) break;
        pagina++;
    }
    return todos;
}

async function cargar() {
    const grid = document.getElementById('resultado');
    const pag  = document.getElementById('paginacion');
    grid.innerHTML = `<p class="msg">Cargando datos de Hyrule...</p>`;
    pag.innerHTML  = '';
    try {
        if (todosLosItems.length === 0) todosLosItems = await traerTodos();
        const filtrados = queryActual
            ? todosLosItems.filter(i => {
                if (!i.name) return false;
                const n = i.name.toLowerCase(), q = queryActual.toLowerCase();
                return n.includes(q) || levenshtein(n,q)<=2 || n.split(' ').some(p=>levenshtein(p,q)<=2);
            })
            : todosLosItems;

        if (!todosLosItems.length) {
            grid.innerHTML = `<p class="msg">Esta categoría no tiene datos disponibles en la API.</p>`;
            return;
        }
        if (!filtrados.length) {
            grid.innerHTML = `<p class="msg">No se encontró "<em>${queryActual}</em>"</p>`;
            return;
        }
        const inicio = (paginaActual-1)*POR_PAGINA;
        grid.innerHTML = filtrados.slice(inicio, inicio+POR_PAGINA).map(item => crearCard(item)).join('');
        renderizarPaginacion(filtrados.length);
    } catch(e) {
        grid.innerHTML = `<p class="msg">Error al conectar con la API de Zelda.</p>`;
    }
}

function crearCard(item) {
    const labelCat = CATEGORIAS.find(c=>c.key===categoriaActual)?.label ?? '';
    const imagen   = obtenerImagen(item.name);
    const nombre   = (item.name ?? 'Sin nombre').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    const desc     = (item.description || item.comment || 'Sin descripción disponible').replace(/'/g,"&#39;").replace(/"/g,"&quot;");

    const imgParte = imagen
        ? `<img src="${imagen}" alt="${nombre}" onerror="this.outerHTML='<div class=\\'sin-imagen\\'><span class=\\'escudo\\'>🛡️</span><span class=\\'nombre-ph\\'>${nombre}</span></div>'">`
        : `<div class="sin-imagen"><span class="escudo">🛡️</span><span class="nombre-ph">${nombre}</span></div>`;

    return `
    <div class="card">
        ${imgParte}
        <div class="overlay">
            <div class="nombre">${nombre}</div>
            <div class="acciones">
                <span class="badge">${labelCat}</span>
                <button class="btn-resumen" onclick="abrirModal('${nombre}','${imagen||''}','${desc}')">Resumen</button>
            </div>
        </div>
    </div>`;
}

function abrirModal(nombre, imagen, desc) {
    document.getElementById('modalNombre').textContent = nombre;
    document.getElementById('modalDesc').textContent   = desc;
    const img = document.getElementById('modalImg');
    if (imagen) { img.src = imagen; img.style.display='block'; }
    else img.style.display = 'none';
    document.getElementById('modalBg').classList.add('open');
}

function cerrarModal(e) {
    if (!e || e.target === document.getElementById('modalBg')) {
        document.getElementById('modalBg').classList.remove('open');
    }
}

function renderizarPaginacion(total) {
    const pag = document.getElementById('paginacion');
    const totalPags = Math.ceil(total/POR_PAGINA);
    if (totalPags <= 1) return;
    const btnPrev = document.createElement('button');
    btnPrev.textContent='← Anterior'; btnPrev.disabled=paginaActual===1;
    btnPrev.onclick=()=>{paginaActual--;cargar();window.scrollTo(0,0);};
    const info = document.createElement('span');
    info.textContent=`Página ${paginaActual} de ${totalPags} (${total} resultados)`;
    const btnNext = document.createElement('button');
    btnNext.textContent='Siguiente →'; btnNext.disabled=paginaActual===totalPags;
    btnNext.onclick=()=>{paginaActual++;cargar();window.scrollTo(0,0);};
    pag.append(btnPrev, info, btnNext);
}

function buscar() {
    queryActual=document.getElementById('busqueda').value.trim();
    paginaActual=1; cargar();
}

cargar();
</script>
