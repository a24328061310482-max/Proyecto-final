<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Hummus', sans-serif;
    background: linear-gradient(135deg, #000000, #1a0000);
    color: #ffdddd;
    min-height: 100vh;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    font-size: 2.8rem;
    color: #ff3333;
    letter-spacing: 5px;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #000;
    margin-bottom: 20px;
}

/* ── NAVBAR ── */
.navbar { background-color: #1f0000; border: 3px solid #8b0000; padding: 12px 20px; border-radius: 12px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(139,0,0,0.6); }
.navbar a.brand { color: #ffaaaa; text-decoration: none; font-size: 1.3rem; margin-right: 16px; }
.navbar a.brand:hover { color: #ff4d4d; }
.nav-items { display: flex; gap: 4px; }
.dropdown { position: relative; }
.dropdown > a { color: #ffaaaa; text-decoration: none; font-size: 1.1rem; padding: 8px 14px; border-radius: 8px; display: flex; align-items: center; gap: 6px; transition: color .2s, background .2s; }
.dropdown > a:hover { color: #ff4d4d; background: rgba(139,0,0,0.3); }
.caret { font-size: .65em; display: inline-block; transition: transform .25s ease; }
.dropdown:hover .caret { transform: rotate(180deg); }
.dropdown-menu { position: absolute; top: calc(100% + 8px); left: 0; background: #1a0000; border: 2px solid #8b0000; border-radius: 10px; min-width: 170px; overflow: hidden; z-index: 100; opacity: 0; transform: translateY(-10px) scaleY(0.9); transform-origin: top center; pointer-events: none; transition: opacity .22s ease, transform .22s ease; box-shadow: 0 8px 24px rgba(139,0,0,0.5); }
.dropdown:hover .dropdown-menu, .dropdown:focus-within .dropdown-menu { opacity: 1; transform: translateY(0) scaleY(1); pointer-events: all; }
.dropdown-menu a { display: block; padding: 10px 18px; color: #ffbbbb; text-decoration: none; font-size: 1rem; border-bottom: 1px solid rgba(139,0,0,0.3); transition: background .18s, color .18s, padding-left .2s; }
.dropdown-menu a:last-child { border-bottom: none; }
.dropdown-menu a:hover { background: rgba(139,0,0,0.4); color: #ff4d4d; padding-left: 26px; }

/* ── NAV LINKS ── */
.nav-links { text-align: center; margin-bottom: 36px; }
.btn-nueva {
    display: inline-block;
    padding: 12px 30px;
    background: #8b0000;
    border: 2px solid #8b0000;
    border-radius: 10px;
    color: #ffdddd;
    text-decoration: none;
    font-size: 1rem;
    letter-spacing: 2px;
    transition: background .2s, box-shadow .2s, transform .15s;
    box-shadow: 0 0 12px rgba(139,0,0,0.4);
}
.btn-nueva:hover { background: #ff3333; border-color: #ff3333; box-shadow: 0 0 20px rgba(255,51,51,0.6); transform: scale(1.03); }

/* ── GRID CARDS ── */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    max-width: 1300px;
    margin: 0 auto;
}

.x-card {
    background: #1a0000;
    border: 3px solid #8b0000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(139,0,0,0.5);
    transition: transform .25s, box-shadow .25s;
}
.x-card:hover { transform: scale(1.04); box-shadow: 0 0 32px rgba(255,51,51,0.5); }

.card-header {
    background: #8b0000;
    color: #ffdddd;
    font-size: 1.2rem;
    letter-spacing: 2px;
    padding: 14px 18px;
    text-align: center;
    text-transform: uppercase;
    border-bottom: 2px solid #ff3333;
}

.card-img-container {
    width: 100%;
    height: 220px;
    background: #0c0c0c;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid #330000;
    overflow: hidden;
}
.card-img { width: 100%; height: 100%; object-fit: cover; }
.sin-foto { color: #ff6666; font-size: 1rem; opacity: .6; }

.card-stat {
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    border-bottom: 1px solid #330000;
    font-size: .95rem;
}
.stat-label { color: #ff9999; font-size: .85rem; }
.card-stat span:last-child { color: #ffdddd; text-align: right; max-width: 65%; }

.card-bio {
    padding: 12px 16px;
    font-size: .9rem;
    color: #ffbbbb;
    line-height: 1.5;
}
.card-bio .stat-label { display: block; margin-bottom: 4px; }

.empty-msg { grid-column: span 3; text-align: center; color: #ff9999; font-size: 1.2rem; padding: 40px 0; }
</style>
</head>

<h1>Archivo BL: Colección de Series</h1>

<div class="nav-links">
    <a href="From.html" class="btn-nueva">➕ Nueva Serie / Personaje</a>
</div>

<div class="cards-grid" id="cardsGrid">
    <!-- Se renderizan desde JS -->
</div>

<script>
// Datos de maqueta — reemplazar con fetch al servidor cuando haya BD
const personajes = [
    {
        id: 1,
        nombre_personaje: "Light Yagami",
        nombrereal: "Light Yagami",
        nombre_equipo: "Kira",
        poderes: "Death Note, inteligencia superior",
        altura: "1.79m",
        bio: "Estudiante brillante que encuentra el Death Note y decide usarlo para crear un mundo perfecto.",
        imagen: null,
        nombre_serie: "Death Note"
    },
    {
        id: 2,
        nombre_personaje: "L Lawliet",
        nombrereal: "L",
        nombre_equipo: "Interpol",
        poderes: "Deducción extrema, análisis",
        altura: "1.79m",
        bio: "El mejor detective del mundo, enfrentado a Kira en una batalla de ingenio sin precedentes.",
        imagen: null,
        nombre_serie: "Death Note"
    },
    {
        id: 3,
        nombre_personaje: "Ryuk",
        nombrereal: "Desconocido",
        nombre_equipo: "Independiente",
        poderes: "Invisibilidad, volar, Death Note",
        altura: "2.30m",
        bio: "Shinigami aburrido que dejó caer su Death Note al mundo humano por diversión.",
        imagen: null,
        nombre_serie: "Death Note"
    },
];

const grid = document.getElementById('cardsGrid');

if (personajes.length === 0) {
    grid.innerHTML = `<p class="empty-msg">No hay personajes registrados aún 💔</p>`;
} else {
    personajes.forEach(p => {
        const imgHtml = p.imagen
            ? `<img src="${p.imagen}" class="card-img" alt="Foto">`
            : `<span class="sin-foto">Sin Foto</span>`;

        grid.innerHTML += `
        <div class="x-card">
            <div class="card-header">${p.nombre_personaje}</div>
            <div class="card-img-container">${imgHtml}</div>
            <div class="card-stat">
                <span class="stat-label">Serie:</span>
                <span>${p.nombre_serie ?? '—'}</span>
            </div>
            <div class="card-stat">
                <span class="stat-label">Equipo:</span>
                <span>${p.nombre_equipo ?? 'Independiente'}</span>
            </div>
            <div class="card-stat">
                <span class="stat-label">Identidad:</span>
                <span>${p.nombrereal}</span>
            </div>
            <div class="card-stat">
                <span class="stat-label">Poderes:</span>
                <span>${p.poderes}</span>
            </div>
            <div class="card-stat">
                <span class="stat-label">Altura:</span>
                <span>${p.altura ?? 'N/A'}</span>
            </div>
            <div class="card-bio">
                <span class="stat-label">Bio:</span>
                ${p.bio}
            </div>
        </div>`;
    });
}
</script>
